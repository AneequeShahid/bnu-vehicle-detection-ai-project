name: Automated Testing

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test-detection-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt 

      - name: 🏋️ Download model weights
        run: |
          mkdir -p trained_models
          wget -O trained_models/best.pt "https://github.com/AneequeShahid/bnu-vehicle-detection-ai-project/releases/download/v1.0.0/best.pt"

      - name: 🧪 Run detection logic tests
        run: |
          python backend/test_detect.py
